<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dice Roller</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;margin:2rem}
    label,button{font-size:1rem}

    #diceContainer{margin-top:.75rem;display:flex;gap:.5rem;align-items:center}
    .die{width:56px;height:56px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;border:1px solid #ccc;border-radius:8px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.08);transition:transform .18s cubic-bezier(.2,.9,.3,1),opacity .18s ease,box-shadow .18s ease}
    .rolling{animation:rollingAnim .12s linear infinite}
    @keyframes rollingAnim{0%{transform:translateY(0) rotate(0) scale(1)}25%{transform:translateY(-4px) rotate(-8deg) scale(1.02)}50%{transform:translateY(0) rotate(0) scale(1.04)}75%{transform:translateY(4px) rotate(8deg) scale(1.02)}100%{transform:translateY(0) rotate(0) scale(1)}}
    .pop{animation:popAnim .28s cubic-bezier(.2,.8,.2,1) both}
    @keyframes popAnim{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08);opacity:1}100%{transform:scale(1);opacity:1}}
    #sum{margin-top:.5rem;font-weight:600}
  </style>
</head>
<body>
  <h1>Dice Roller</h1>
  <label>
    Number of die:
    <select id="dice">
      <option value="1">1</option>
      <option value="2">2</option>
    </select>
  </label>
  <button id="roll">Roll</button>
  <button id="reset" style="margin-left:.5rem">Reset</button>


  <div id="resultWrap">
    <div id="diceContainer" aria-hidden="false"></div>
    <div id="sum" aria-live="polite" style="margin-top:.5rem;font-weight:600"></div>
  </div>

  <script>
    // unregister any existing service workers (remove PWA behavior)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister().catch(function () {}); });
      }).catch(function () {});
    }
    // secure integer in [min,max]
    function randInt(min, max) {
      const range = max - min + 1;
      const rnd = new Uint32Array(1);
      window.crypto.getRandomValues(rnd);
      return min + (rnd[0] % range);
    }

    const resultEl = document.getElementById('sum');
    const rollBtn = document.getElementById('roll');
    const resetBtn = document.getElementById('reset');

    const diceContainer = document.getElementById('diceContainer');

    // map 1..6 to Unicode dice faces ⚀..⚅ (U+2680..U+2685)
    function faceFor(v) {
      return String.fromCodePoint(0x2680 + (v - 1));
    }

    function createDieEl() {
      const el = document.createElement('div');
      el.className = 'die';
      el.textContent = '';
      return el;
    }

    function doRoll() {
      const d = Number(document.getElementById('dice').value);
      // normalize: if 2 dice, roll two 1..6 dice and show both faces and the sum
      diceContainer.innerHTML = '';
      const diceEls = [];
      for (let i = 0; i < d; i++) {
        const el = createDieEl();
        diceContainer.appendChild(el);
        diceEls.push(el);
      }

      // animation: rapidly change faces for duration then show final
      const duration = 700;
      const intervalMs = 80;
      diceEls.forEach(e => e.classList.add('rolling'));
      const iv = setInterval(() => {
        diceEls.forEach(e => {
          e.textContent = faceFor(randInt(1, 6));
        });
      }, intervalMs);

      setTimeout(() => {
        clearInterval(iv);
        const values = diceEls.map(() => randInt(1, 6));
        diceEls.forEach((e, i) => {
          e.textContent = faceFor(values[i]);
          e.classList.remove('rolling');
        });
        const sum = values.reduce((a, b) => a + b, 0);
        resultEl.textContent = d === 1 ? 'You rolled: ' + values[0] : `You rolled: ${values.join(', ')} (sum ${sum})`;
      }, duration);
    }

    rollBtn.addEventListener('click', doRoll);
    resetBtn.addEventListener('click', function () {
      resultEl.textContent = '';
      diceContainer.innerHTML = '';
      document.getElementById('dice').value = '1';
      rollBtn.focus();
    });


  </script>
</body>
</html>
